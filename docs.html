<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="description" content="Official API documentation for Nexus Titan 2.0 ULTRA. Explore 200+ functions including Math, IO, Networking, GUI, and System control.">
    <meta name="keywords" content="Nexus Titan Docs, API Reference, Programming Documentation, Syntax, Scripting Functions">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Nexus Titan 2.0 Documentation">
    <meta property="og:description" content="Complete reference for Math, String, System, and GUI modules in Nexus Titan.">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://tiwut.github.io/Nexus-the-programming-language/docs.html">
    <meta property="og:image" content="https://tiwut.github.io/Nexus-the-programming-language/preview.jpg">

    <meta name="theme-color" content="#030303">


    <title>Documentation | Nexus Titan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030303;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --accent: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('main.avif') no-repeat center center/cover;
            filter: blur(10px) brightness(0.4);
            z-index: -1;
        }

        nav {
            padding: 20px 40px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; }
        .back-link { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--accent); }

        .search-hero { padding: 60px 20px; text-align: center; }
        .search-container { max-width: 700px; margin: 0 auto; position: relative; }

        input[type="text"] {
            width: 100%; padding: 20px 30px; font-size: 1.1rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px; color: #fff; outline: none;
            backdrop-filter: blur(10px); transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        input[type="text"]:focus {
            border-color: var(--accent); box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
            background: rgba(0,0,0,0.4);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        .func-card {
            background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 25px; transition: 0.3s;
            position: relative; overflow: hidden; backdrop-filter: blur(12px);
        }
        .func-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(30, 30, 30, 0.8); }

        .module-badge {
            display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            padding: 4px 8px; border-radius: 4px; margin-bottom: 10px;
            background: rgba(255,255,255,0.1); color: var(--text-dim);
        }

        .func-card[data-mod="math"] .module-badge { color: #ff79c6; background: rgba(255, 121, 198, 0.1); }
        .func-card[data-mod="str"] .module-badge { color: #f1fa8c; background: rgba(241, 250, 140, 0.1); }
        .func-card[data-mod="gui"] .module-badge { color: #8be9fd; background: rgba(139, 233, 253, 0.1); }
        .func-card[data-mod="sys"] .module-badge { color: #bd93f9; background: rgba(189, 147, 249, 0.1); }
        .func-card[data-mod="io"] .module-badge { color: #ffb86c; background: rgba(255, 184, 108, 0.1); }
        .func-card[data-mod="net"] .module-badge { color: #50fa7b; background: rgba(80, 250, 123, 0.1); }
        .func-card[data-mod="cli"] .module-badge { color: #ff5555; background: rgba(255, 85, 85, 0.1); }
        .func-name { font-family: 'Fira Code', monospace; font-size: 1.1rem; color: #fff; margin-bottom: 8px; font-weight: 600; }
        .func-desc { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; }
        .no-results { text-align: center; grid-column: 1 / -1; padding: 50px; color: var(--text-dim); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="background"></div>

    <nav>
        <a href="index.html" class="logo">NEXUS TITAN <span style="font-weight:300; opacity:0.7">DOCS</span></a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="search-hero">
        <h1 style="margin-bottom: 20px;">Library Reference</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search functions (e.g., math.sin, net.get, gui.window)..." autofocus>
        </div>
    </div>

    <main class="container">
        <div id="grid" class="docs-grid"></div>
    </main>

    <script>
        const functions = [
            { m: 'math', n: 'sin(x)', d: 'Sine of x (radians)' },
            { m: 'math', n: 'cos(x)', d: 'Cosine of x (radians)' },
            { m: 'math', n: 'tan(x)', d: 'Tangent of x (radians)' },
            { m: 'math', n: 'asin(x)', d: 'Arc sine' },
            { m: 'math', n: 'acos(x)', d: 'Arc cosine' },
            { m: 'math', n: 'atan(x)', d: 'Arc tangent' },
            { m: 'math', n: 'atan2(y, x)', d: 'Arc tangent of y/x' },
            { m: 'math', n: 'sinh(x)', d: 'Hyperbolic sine' },
            { m: 'math', n: 'cosh(x)', d: 'Hyperbolic cosine' },
            { m: 'math', n: 'tanh(x)', d: 'Hyperbolic tangent' },
            { m: 'math', n: 'sqrt(x)', d: 'Square root' },
            { m: 'math', n: 'cbrt(x)', d: 'Cube root' },
            { m: 'math', n: 'pow(x, y)', d: 'x raised to power y' },
            { m: 'math', n: 'exp(x)', d: 'e raised to power x' },
            { m: 'math', n: 'log(x)', d: 'Natural logarithm' },
            { m: 'math', n: 'log10(x)', d: 'Base-10 logarithm' },
            { m: 'math', n: 'log2(x)', d: 'Base-2 logarithm' },
            { m: 'math', n: 'abs(x)', d: 'Absolute value' },
            { m: 'math', n: 'ceil(x)', d: 'Round up' },
            { m: 'math', n: 'floor(x)', d: 'Round down' },
            { m: 'math', n: 'round(x)', d: 'Round to nearest integer' },
            { m: 'math', n: 'trunc(x)', d: 'Truncate decimal' },
            { m: 'math', n: 'pi()', d: 'Returns 3.14159...' },
            { m: 'math', n: 'e()', d: 'Returns 2.718...' },
            { m: 'math', n: 'tau()', d: 'Returns 6.283...' },
            { m: 'math', n: 'deg(x)', d: 'Radians to Degrees' },
            { m: 'math', n: 'rad(x)', d: 'Degrees to Radians' },
            { m: 'math', n: 'min(a, b)', d: 'Minimum value' },
            { m: 'math', n: 'max(a, b)', d: 'Maximum value' },
            { m: 'math', n: 'hypot(x, y)', d: 'Euclidean distance' },
            { m: 'math', n: 'gcd(a, b)', d: 'Greatest common divisor' },
            { m: 'math', n: 'lcm(a, b)', d: 'Least common multiple' },
            { m: 'math', n: 'fact(x)', d: 'Factorial of x' },
            { m: 'math', n: 'perm(n, k)', d: 'Permutations' },
            { m: 'math', n: 'comb(n, k)', d: 'Combinations' },
            { m: 'math', n: 'is_nan(x)', d: 'Check if NaN' },
            { m: 'math', n: 'is_inf(x)', d: 'Check if Infinity' },
            { m: 'math', n: 'dist(p, q)', d: 'Distance between points' },
            { m: 'str', n: 'len(s)', d: 'String length' },
            { m: 'str', n: 'upper(s)', d: 'To uppercase' },
            { m: 'str', n: 'lower(s)', d: 'To lowercase' },
            { m: 'str', n: 'cap(s)', d: 'Capitalize first letter' },
            { m: 'str', n: 'trim(s)', d: 'Remove whitespace' },
            { m: 'str', n: 'replace(s, old, new)', d: 'Replace text' },
            { m: 'str', n: 'split(s, delim)', d: 'Split into list' },
            { m: 'str', n: 'join(delim, list)', d: 'Join list to string' },
            { m: 'str', n: 'at(s, i)', d: 'Character at index' },
            { m: 'str', n: 'find(s, sub)', d: 'Find substring index' },
            { m: 'str', n: 'starts(s, sub)', d: 'Check start' },
            { m: 'str', n: 'ends(s, sub)', d: 'Check end' },
            { m: 'str', n: 'isnum(s)', d: 'Is numeric' },
            { m: 'str', n: 'isalpha(s)', d: 'Is alphabetic' },
            { m: 'str', n: 'reverse(s)', d: 'Reverse string' },
            { m: 'str', n: 'repeat(s, n)', d: 'Repeat n times' },
            { m: 'str', n: 'slice(s, start, end)', d: 'Extract substring' },
            { m: 'str', n: 'count(s, sub)', d: 'Count occurrences' },
            { m: 'str', n: 'zfill(s, width)', d: 'Pad with zeros' },
            { m: 'str', n: 'title(s)', d: 'Title Case' },
            { m: 'str', n: 'swap(s)', d: 'Swap case' },
            { m: 'str', n: 'ord(c)', d: 'Char to ASCII code' },
            { m: 'str', n: 'chr(i)', d: 'ASCII code to char' },
            { m: 'str', n: 'hex(x)', d: 'To hexadecimal' },
            { m: 'str', n: 'bin(x)', d: 'To binary' },
            { m: 'sys', n: 'os()', d: 'OS Name (Windows/Linux)' },
            { m: 'sys', n: 'ver()', d: 'Kernel Version' },
            { m: 'sys', n: 'arch()', d: 'System Architecture' },
            { m: 'sys', n: 'user()', d: 'Current Username' },
            { m: 'sys', n: 'cwd()', d: 'Current Working Directory' },
            { m: 'sys', n: 'exit()', d: 'Terminate program' },
            { m: 'sys', n: 'sleep(sec)', d: 'Pause execution' },
            { m: 'sys', n: 'time()', d: 'Unix Timestamp' },
            { m: 'sys', n: 'shell(cmd)', d: 'Execute shell command' },
            { m: 'sys', n: 'env(key)', d: 'Get environment var' },
            { m: 'sys', n: 'cpu_count()', d: 'Number of CPU cores' },
            { m: 'sys', n: 'mem()', d: 'Disk usage info' },
            { m: 'io', n: 'read(path)', d: 'Read file content' },
            { m: 'io', n: 'write(path, data)', d: 'Write to file' },
            { m: 'io', n: 'append(path, data)', d: 'Append to file' },
            { m: 'io', n: 'exists(path)', d: 'Check existence' },
            { m: 'io', n: 'isdir(path)', d: 'Is directory?' },
            { m: 'io', n: 'isfile(path)', d: 'Is file?' },
            { m: 'io', n: 'mkdir(path)', d: 'Create directory' },
            { m: 'io', n: 'remove(path)', d: 'Delete file' },
            { m: 'io', n: 'copy(src, dst)', d: 'Copy file' },
            { m: 'io', n: 'move(src, dst)', d: 'Move file' },
            { m: 'io', n: 'size(path)', d: 'File size in bytes' },
            { m: 'io', n: 'list(dir)', d: 'List directory' },
            { m: 'io', n: 'ext(path)', d: 'Get file extension' },
            { m: 'io', n: 'base(path)', d: 'Get filename' },
            { m: 'net', n: 'get(url)', d: 'HTTP GET Request' },
            { m: 'net', n: 'download(url, file)', d: 'Download file' },
            { m: 'net', n: 'ping(host)', d: 'Ping host' },
            { m: 'net', n: 'ip()', d: 'Get local IP' },
            { m: 'net', n: 'host()', d: 'Get hostname' },
            { m: 'gui', n: 'window(title, size)', d: 'Create Main Window' },
            { m: 'gui', n: 'msg(text)', d: 'Info Popup' },
            { m: 'gui', n: 'warn(text)', d: 'Warning Popup' },
            { m: 'gui', n: 'err(text)', d: 'Error Popup' },
            { m: 'gui', n: 'input(prompt)', d: 'Input Dialog' },
            { m: 'gui', n: 'ask(text)', d: 'Yes/No Dialog' },
            { m: 'gui', n: 'label(text)', d: 'Add Label' },
            { m: 'gui', n: 'button(text, func)', d: 'Add Button' },
            { m: 'gui', n: 'run()', d: 'Start Event Loop' },
            { m: 'gui', n: 'clear()', d: 'Clear Widgets' },
            { m: 'cli', n: 'red(text)', d: 'Red Text' },
            { m: 'cli', n: 'green(text)', d: 'Green Text' },
            { m: 'cli', n: 'blue(text)', d: 'Blue Text' },
            { m: 'cli', n: 'yellow(text)', d: 'Yellow Text' },
            { m: 'cli', n: 'cyan(text)', d: 'Cyan Text' },
            { m: 'cli', n: 'clear()', d: 'Clear Terminal' },
            { m: 'json', n: 'parse(str)', d: 'JSON to Object' },
            { m: 'json', n: 'str(obj)', d: 'Object to JSON string' },
            { m: 'json', n: 'load(file)', d: 'Load JSON file' },
            { m: 'json', n: 'save(file, obj)', d: 'Save JSON file' }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');

        function render(filter = '') {
            grid.innerHTML = '';
            const term = filter.toLowerCase();
            
            const filtered = functions.filter(f => 
                f.n.toLowerCase().includes(term) || 
                f.m.toLowerCase().includes(term) || 
                f.d.toLowerCase().includes(term)
            );

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">No functions found for "${filter}"</div>`;
                return;
            }

            filtered.forEach(f => {
                const el = document.createElement('div');
                el.className = 'func-card';
                el.setAttribute('data-mod', f.m);
                el.innerHTML = `
                    <div class="module-badge">${f.m}</div>
                    <div class="func-name">${f.n}</div>
                    <div class="func-desc">${f.d}</div>
                `;
                grid.appendChild(el);
            });
        }

        searchInput.addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
