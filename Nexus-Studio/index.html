<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nexus Studio 2.0 ULTRA</title>
    <script src="https://unpkg.com/blockly@10.0.0/blockly.min.js"></script>

    <style>
        :root {
            --bg: #1e1e1e;
            --panel: #252526;
            --border: #3e3e42;
            --accent: #00f2ff;
            --text: #ffffff;
            --green: #4caf50;
            --orange: #e67e22;
            --purple: #9b59b6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #2d2d30;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
        }

        .brand {
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .brand span {
            color: var(--accent);
        }

        .version-badge {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            margin-left: 8px;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .run {
            background: var(--green);
        }

        .run:hover {
            background: #43a047;
            transform: translateY(-1px);
        }

        .save-code {
            background: var(--accent);
            color: #000;
        }

        .save-code:hover {
            background: #00d4e6;
        }

        .save-proj {
            background: #5c2d91;
        }

        .save-proj:hover {
            background: #46226e;
        }

        .load-proj {
            background: var(--orange);
        }

        .load-proj:hover {
            background: #d35400;
        }

        .import-nx {
            background: var(--purple);
        }

        .import-nx:hover {
            background: #8e44ad;
        }

        .workspace {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
        }

        .editor {
            flex: 3;
            height: 100%;
        }

        .sidebar {
            flex: 1;
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-width: 350px;
        }

        .panel-header {
            padding: 12px;
            background: #2d2d30;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #aaa;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .code-view {
            flex: 1;
            margin: 0;
            padding: 15px;
            overflow: auto;
            color: #9cdcfe;
            font-family: 'Consolas', 'Courier New', monospace;
            background: #1e1e1e;
            border-bottom: 1px solid var(--border);
            white-space: pre-wrap;
            font-size: 0.9rem;
        }

        .console-view {
            height: 200px;
            padding: 12px;
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Consolas', monospace;
            overflow-y: auto;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <span style="font-size:1.5em">💠</span>
            Nexus<span>Studio</span>
            <div class="version-badge">2.0 ULTRA</div>
        </div>
        <div>
            <input type="file" id="projInput" accept=".xml" style="display: none;">
            <input type="file" id="nxInput" accept=".nx,.txt" style="display: none;">

            <button id="importNxBtn" class="btn import-nx">⬆ Import .nx</button>
            <span
                style="border-left: 1px solid #555; margin: 0 8px; height: 20px; display: inline-block; vertical-align: middle;"></span>
            <button id="loadProjBtn" class="btn load-proj">📂 Load Project</button>
            <button id="saveProjBtn" class="btn save-proj">💾 Save Project</button>
            <span
                style="border-left: 1px solid #555; margin: 0 8px; height: 20px; display: inline-block; vertical-align: middle;"></span>
            <button id="runBtn" class="btn run">▶ Run</button>
            <button id="saveCodeBtn" class="btn save-code">⬇ Export .nx</button>
        </div>
    </header>

    <div class="workspace">
        <div id="blocklyDiv" class="editor"></div>
        <div class="sidebar">
            <div class="panel-header">Generated Nexus Code</div>
            <pre id="codeOutput" class="code-view"></pre>
            <div class="panel-header">Console Output</div>
            <div id="consoleOutput" class="console-view"><span style="color:#666">Nexus 2.0 ULTRA Ready...</span></div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Core" colour="#FFAB00">
            <block type="nexus_out"></block>
            <block type="nexus_input"></block>
            <block type="nexus_wait"></block>
            <block type="nexus_comment"></block>
        </category>
        <category name="Variables" colour="#EF5350" custom="VARIABLE"></category>
        <category name="Logic" colour="#42A5F5">
            <block type="nexus_if"></block>
            <block type="nexus_if_else"></block>
            <block type="nexus_loop"></block>
            <block type="logic_compare"></block>
            <block type="nexus_math_calc"></block>
            <block type="math_number"></block>
            <block type="text"></block>
        </category>
        <category name="Functions" colour="#AB47BC" custom="PROCEDURE"></category>
        <category name="Math" colour="#FF6B6B">
            <block type="nexus_math_func"></block>
            <block type="nexus_math_const"></block>
            <block type="nexus_math_trig"></block>
        </category>
        <category name="Strings" colour="#4ECDC4">
            <block type="nexus_str_func"></block>
            <block type="nexus_str_case"></block>
        </category>
        <category name="System" colour="#95E1D3">
            <block type="nexus_sys_info"></block>
            <block type="nexus_sys_time"></block>
        </category>
        <category name="GUI" colour="#66BB6A">
            <block type="nexus_gui_window"></block>
            <block type="nexus_gui_label"></block>
            <block type="nexus_gui_msg"></block>
            <block type="nexus_gui_warn"></block>
            <block type="nexus_gui_button"></block>
            <block type="nexus_gui_run"></block>
        </category>
        <category name="File I/O" colour="#FFA726">
            <block type="nexus_io_write"></block>
            <block type="nexus_io_read"></block>
            <block type="nexus_io_exists"></block>
        </category>
        <category name="Date/Time" colour="#FFD93D">
            <block type="nexus_date_now"></block>
            <block type="nexus_date_parts"></block>
        </category>
        <category name="Random" colour="#F38181">
            <block type="nexus_rnd_int"></block>
            <block type="nexus_rnd_val"></block>
        </category>
    </xml>

    <script>
        const nexusGen = new Blockly.Generator('Nexus');
        const ORDER_ATOMIC = 0;
        const ORDER_NONE = 99;
        nexusGen.scrub_ = function (block, code, opt_thisOnly) {
            const nextBlock = block.nextConnection && block.nextConnection.targetBlock();
            const nextCode = opt_thisOnly ? '' : nexusGen.blockToCode(nextBlock);
            return code + nextCode;
        };

        Blockly.defineBlocksWithJsonArray([
            { "type": "nexus_out", "message0": "out %1", "args0": [{ "type": "input_value", "name": "TEXT" }], "previousStatement": null, "nextStatement": null, "colour": 40 },
            { "type": "nexus_input", "message0": "input to %1 prompt %2", "args0": [{ "type": "field_variable", "name": "VAR", "variable": "x" }, { "type": "input_value", "name": "PROMPT" }], "previousStatement": null, "nextStatement": null, "colour": 40 },
            { "type": "nexus_wait", "message0": "wait %1 seconds", "args0": [{ "type": "input_value", "name": "SECONDS" }], "previousStatement": null, "nextStatement": null, "colour": 40 },
            { "type": "nexus_comment", "message0": "# %1", "args0": [{ "type": "field_input", "name": "TEXT", "text": "comment" }], "previousStatement": null, "nextStatement": null, "colour": 200 },
            { "type": "nexus_math_calc", "message0": "%1 %2 %3", "args0": [{ "type": "input_value", "name": "A" }, { "type": "field_dropdown", "name": "OP", "options": [["+", "+"], ["-", "-"], ["*", "*"], ["/", "/"]] }, { "type": "input_value", "name": "B" }], "output": null, "colour": 230 },
            { "type": "nexus_if", "message0": "if %1", "args0": [{ "type": "input_value", "name": "COND" }], "message1": "do %1", "args1": [{ "type": "input_statement", "name": "DO" }], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "nexus_if_else", "message0": "if %1", "args0": [{ "type": "input_value", "name": "COND" }], "message1": "do %1", "args1": [{ "type": "input_statement", "name": "DO" }], "message2": "else %1", "args2": [{ "type": "input_statement", "name": "ELSE" }], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "nexus_loop", "message0": "loop %1 times", "args0": [{ "type": "input_value", "name": "COUNT" }], "message1": "do %1", "args1": [{ "type": "input_statement", "name": "DO" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_math_func", "message0": "math.%1 ( %2 )", "args0": [{ "type": "field_dropdown", "name": "FUNC", "options": [["sqrt", "sqrt"], ["abs", "abs"], ["ceil", "ceil"], ["floor", "floor"], ["round", "round"], ["log", "log"], ["exp", "exp"], ["pow", "pow"]] }, { "type": "input_value", "name": "NUM" }], "output": null, "colour": 230 },
            { "type": "nexus_math_const", "message0": "math.%1 ()", "args0": [{ "type": "field_dropdown", "name": "CONST", "options": [["pi", "pi"], ["e", "e"], ["tau", "tau"]] }], "output": null, "colour": 230 },
            { "type": "nexus_math_trig", "message0": "math.%1 ( %2 )", "args0": [{ "type": "field_dropdown", "name": "FUNC", "options": [["sin", "sin"], ["cos", "cos"], ["tan", "tan"], ["asin", "asin"], ["acos", "acos"], ["atan", "atan"]] }, { "type": "input_value", "name": "ANGLE" }], "output": null, "colour": 230 },
            { "type": "nexus_str_func", "message0": "str.%1 ( %2 )", "args0": [{ "type": "field_dropdown", "name": "FUNC", "options": [["len", "len"], ["reverse", "reverse"], ["trim", "trim"], ["find", "find"]] }, { "type": "input_value", "name": "STR" }], "output": null, "colour": 160 },
            { "type": "nexus_str_case", "message0": "str.%1 ( %2 )", "args0": [{ "type": "field_dropdown", "name": "FUNC", "options": [["upper", "upper"], ["lower", "lower"], ["cap", "cap"]] }, { "type": "input_value", "name": "STR" }], "output": null, "colour": 160 },
            { "type": "nexus_sys_info", "message0": "sys.%1 ()", "args0": [{ "type": "field_dropdown", "name": "FUNC", "options": [["os", "os"], ["user", "user"], ["cwd", "cwd"], ["info", "info"]] }], "output": null, "colour": 180 },
            { "type": "nexus_sys_time", "message0": "sys.time ()", "output": null, "colour": 180 },
            { "type": "nexus_gui_msg", "message0": "gui.msg ( %1 )", "args0": [{ "type": "input_value", "name": "TEXT" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_gui_warn", "message0": "gui.warn ( %1 )", "args0": [{ "type": "input_value", "name": "TEXT" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_gui_window", "message0": "gui.window ( %1 )", "args0": [{ "type": "input_value", "name": "TITLE" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_gui_label", "message0": "gui.label ( %1 )", "args0": [{ "type": "input_value", "name": "TEXT" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_gui_button", "message0": "gui.button ( %1, runs %2 )", "args0": [{ "type": "input_value", "name": "LABEL" }, { "type": "input_value", "name": "FUNC" }], "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "nexus_gui_run", "message0": "gui.run ()", "previousStatement": null, "colour": 120 },
            { "type": "nexus_io_write", "message0": "io.write ( %1, %2 )", "args0": [{ "type": "input_value", "name": "FILENAME" }, { "type": "input_value", "name": "CONTENT" }], "previousStatement": null, "nextStatement": null, "colour": 30 },
            { "type": "nexus_io_read", "message0": "io.read ( %1 )", "args0": [{ "type": "input_value", "name": "FILENAME" }], "output": null, "colour": 30 },
            { "type": "nexus_io_exists", "message0": "io.exists ( %1 )", "args0": [{ "type": "input_value", "name": "PATH" }], "output": null, "colour": 30 },
            { "type": "nexus_date_now", "message0": "date.now ()", "output": null, "colour": 60 },
            { "type": "nexus_date_parts", "message0": "date.%1 ()", "args0": [{ "type": "field_dropdown", "name": "PART", "options": [["year", "year"], ["month", "month"], ["day", "day"], ["hour", "hour"], ["min", "min"], ["sec", "sec"]] }], "output": null, "colour": 60 },
            { "type": "nexus_rnd_int", "message0": "rnd.int ( %1, %2 )", "args0": [{ "type": "input_value", "name": "MIN" }, { "type": "input_value", "name": "MAX" }], "output": null, "colour": 330 },
            { "type": "nexus_rnd_val", "message0": "rnd.val ()", "output": null, "colour": 330 },
        ]);

        nexusGen.forBlock['text'] = function (b) { return ['"' + b.getFieldValue('TEXT') + '"', ORDER_ATOMIC]; };
        nexusGen.forBlock['math_number'] = function (b) { return [b.getFieldValue('NUM'), ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_out'] = function (b) { return 'out ' + (nexusGen.valueToCode(b, 'TEXT', ORDER_NONE) || '""') + '\n'; };
        nexusGen.forBlock['nexus_input'] = function (b) { return 'input ' + Blockly.Names.prototype.getName.call(nexusGen.nameDB_, b.getFieldValue('VAR'), 'VARIABLE') + ' ' + (nexusGen.valueToCode(b, 'PROMPT', ORDER_NONE) || '""') + '\n'; };
        nexusGen.forBlock['nexus_wait'] = function (b) { return 'wait ' + (nexusGen.valueToCode(b, 'SECONDS', ORDER_NONE) || '1') + '\n'; };
        nexusGen.forBlock['variables_set'] = function (b) { return 'set ' + Blockly.Names.prototype.getName.call(nexusGen.nameDB_, b.getFieldValue('VAR'), 'VARIABLE') + ' = ' + (nexusGen.valueToCode(b, 'VALUE', ORDER_NONE) || '0') + '\n'; };
        nexusGen.forBlock['variables_get'] = function (b) { return [Blockly.Names.prototype.getName.call(nexusGen.nameDB_, b.getFieldValue('VAR'), 'VARIABLE'), ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_math_calc'] = function (b) { return [(nexusGen.valueToCode(b, 'A', ORDER_ATOMIC) || '0') + ' ' + b.getFieldValue('OP') + ' ' + (nexusGen.valueToCode(b, 'B', ORDER_ATOMIC) || '0'), ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_if'] = function (b) { return 'if ' + (nexusGen.valueToCode(b, 'COND', ORDER_NONE) || '1') + '\n' + nexusGen.statementToCode(b, 'DO') + 'end\n'; };
        nexusGen.forBlock['nexus_if_else'] = function (b) { return 'if ' + (nexusGen.valueToCode(b, 'COND', ORDER_NONE) || '1') + '\n' + nexusGen.statementToCode(b, 'DO') + 'else\n' + nexusGen.statementToCode(b, 'ELSE') + 'end\n'; };
        nexusGen.forBlock['nexus_loop'] = function (b) { return 'loop ' + (nexusGen.valueToCode(b, 'COUNT', ORDER_NONE) || '1') + '\n' + nexusGen.statementToCode(b, 'DO') + 'end\n'; };
        nexusGen.forBlock['logic_compare'] = function (b) { return [(nexusGen.valueToCode(b, 'A', ORDER_ATOMIC) || '0') + ' ' + { 'EQ': '==', 'NEQ': '!=', 'LT': '<', 'LTE': '<=', 'GT': '>', 'GTE': '>=' }[b.getFieldValue('OP')] + ' ' + (nexusGen.valueToCode(b, 'B', ORDER_ATOMIC) || '0'), ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_math_func'] = function (b) { return ['math.' + b.getFieldValue('FUNC') + '(' + (nexusGen.valueToCode(b, 'NUM', ORDER_NONE) || '0') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_math_const'] = function (b) { return ['math.' + b.getFieldValue('CONST') + '()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_math_trig'] = function (b) { return ['math.' + b.getFieldValue('FUNC') + '(' + (nexusGen.valueToCode(b, 'ANGLE', ORDER_NONE) || '0') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_str_func'] = function (b) { return ['str.' + b.getFieldValue('FUNC') + '(' + (nexusGen.valueToCode(b, 'STR', ORDER_NONE) || '""') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_str_case'] = function (b) { return ['str.' + b.getFieldValue('FUNC') + '(' + (nexusGen.valueToCode(b, 'STR', ORDER_NONE) || '""') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_sys_info'] = function (b) { return ['sys.' + b.getFieldValue('FUNC') + '()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_sys_time'] = function (b) { return ['sys.time()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_gui_msg'] = function (b) { return 'gui.msg(' + (nexusGen.valueToCode(b, 'TEXT', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_gui_warn'] = function (b) { return 'gui.warn(' + (nexusGen.valueToCode(b, 'TEXT', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_gui_window'] = function (b) { return 'gui.window(' + (nexusGen.valueToCode(b, 'TITLE', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_gui_label'] = function (b) { return 'gui.label(' + (nexusGen.valueToCode(b, 'TEXT', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_gui_button'] = function (b) { return 'gui.button(' + (nexusGen.valueToCode(b, 'LABEL', ORDER_NONE) || '""') + ', ' + (nexusGen.valueToCode(b, 'FUNC', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_gui_run'] = function (b) { return 'gui.run()\n'; };
        nexusGen.forBlock['nexus_io_write'] = function (b) { return 'io.write(' + (nexusGen.valueToCode(b, 'FILENAME', ORDER_NONE) || '""') + ', ' + (nexusGen.valueToCode(b, 'CONTENT', ORDER_NONE) || '""') + ')\n'; };
        nexusGen.forBlock['nexus_io_read'] = function (b) { return ['io.read(' + (nexusGen.valueToCode(b, 'FILENAME', ORDER_NONE) || '""') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_io_exists'] = function (b) { return ['io.exists(' + (nexusGen.valueToCode(b, 'PATH', ORDER_NONE) || '""') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_date_now'] = function (b) { return ['date.now()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_date_parts'] = function (b) { return ['date.' + b.getFieldValue('PART') + '()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_rnd_int'] = function (b) { return ['rnd.int(' + (nexusGen.valueToCode(b, 'MIN', ORDER_NONE) || '1') + ', ' + (nexusGen.valueToCode(b, 'MAX', ORDER_NONE) || '10') + ')', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_rnd_val'] = function (b) { return ['rnd.val()', ORDER_ATOMIC]; };
        nexusGen.forBlock['nexus_comment'] = function (b) { return '# ' + b.getFieldValue('TEXT') + '\n'; };

        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            scrollbars: true, trashcan: true,
            grid: { spacing: 25, length: 3, colour: '#444', snap: true },
            zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3 },
            theme: Blockly.Themes.Dark
        });

        nexusGen.nameDB_ = new Blockly.Names('');

        function updateCode() {
            try {
                const code = nexusGen.workspaceToCode(workspace);
                document.getElementById('codeOutput').textContent = code;
            } catch (e) { console.error(e); }
        }
        workspace.addChangeListener(updateCode);

        document.getElementById('saveCodeBtn').addEventListener('click', () => {
            const code = nexusGen.workspaceToCode(workspace);
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([code], { type: "text/plain" }));
            a.download = "program.nx"; a.click();
        });

        document.getElementById('saveProjBtn').addEventListener('click', () => {
            const xmlText = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
            const a = document.createElement("a");
            a.href = URL.createObjectURL(new Blob([xmlText], { type: "text/xml" }));
            a.download = "project.xml"; a.click();
        });

        const projInput = document.getElementById('projInput');
        document.getElementById('loadProjBtn').addEventListener('click', () => projInput.click());
        projInput.addEventListener('change', (e) => {
            const r = new FileReader();
            r.onload = (ev) => { workspace.clear(); Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(ev.target.result), workspace); };
            r.readAsText(e.target.files[0]);
            projInput.value = "";
        });

        const nxInput = document.getElementById('nxInput');
        document.getElementById('importNxBtn').addEventListener('click', () => nxInput.click());
        nxInput.addEventListener('change', (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                try {
                    alert("Basic .nx import is supported. Complex scripts may require manual recreation.");
                } catch (err) {
                    alert("Import Error: " + err.message);
                }
            };
            r.readAsText(e.target.files[0]);
            nxInput.value = "";
        });

        document.getElementById('runBtn').addEventListener('click', () => {
            const consoleDiv = document.getElementById('consoleOutput');
            consoleDiv.innerHTML = "";
            const log = (m) => { consoleDiv.innerHTML += `<div><span style="color:#0f0">›</span> ${m}</div>`; consoleDiv.scrollTop = consoleDiv.scrollHeight; };
            try {
                const lines = nexusGen.workspaceToCode(workspace).split('\n');
                log("Running Nexus 2.0 ULTRA...");
                lines.forEach(line => {
                    line = line.trim();
                    if (!line || line.startsWith('#')) return;
                    if (line.startsWith('out ')) log(line.substring(4).replace(/"/g, ''));
                    else if (line.startsWith('gui.msg')) log("[POPUP] " + line);
                    else if (line.startsWith('gui.')) log("[GUI] " + line);
                    else if (line.startsWith('input')) log("[INPUT] " + line);
                    else log("[EXEC] " + line);
                });
                log("Execution complete!");
            } catch (e) { log("<span style='color:red'>" + e.message + "</span>"); }
        });

        setTimeout(updateCode, 100);
    </script>
</body>

</html>
